
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AI Architect Portfolio // System V3.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00ffff",
                        "secondary": "#ff00ff",
                        "accent": "#fde047",
                        "background-dark": "#050508",
                        "surface": "#0c0c14",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'spin-reverse': 'spin 15s linear infinite reverse',
                        'glitch': 'glitch 1s linear infinite',
                    }
                },
            },
        }
    </script>
    <style>
        @keyframes grid-move {
            0% { transform: perspective(800px) rotateX(60deg) translateY(0) scale(2); }
            100% { transform: perspective(800px) rotateX(60deg) translateY(40px) scale(2); }
        }

        @keyframes glitch {
          0% { transform: translate(0) }
          20% { transform: translate(-2px, 2px) }
          40% { transform: translate(-2px, -2px) }
          60% { transform: translate(2px, 2px) }
          80% { transform: translate(2px, -2px) }
          100% { transform: translate(0) }
        }

        .cyber-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            transform: perspective(800px) rotateX(60deg) translateY(-100px) scale(2);
            opacity: 0.4;
            animation: grid-move 15s linear infinite;
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.6), 0 0 20px rgba(0, 255, 255, 0.2);
        }
        
        .text-glow-magenta {
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.6), 0 0 20px rgba(255, 0, 255, 0.2);
        }

        .hud-corner {
            width: 20px;
            height: 20px;
            border-color: rgba(0, 255, 255, 0.4);
            position: absolute;
        }

        .typing-cursor::after {
            content: '_';
            animation: blink 0.8s step-end infinite;
            color: #00ffff;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
        
        .glass-nav {
            background: rgba(5, 5, 8, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.15);
        }

        .scanlines {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            opacity: 0.1;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #050508;
        }
        ::-webkit-scrollbar-thumb {
            background: #13131f;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00ffff;
        }

        .noise {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          opacity: 0.03;
          pointer-events: none;
          z-index: 1000;
          background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 255, 255, 0.02);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 255, 0.2);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 255, 0.5);
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="font-display bg-background-dark text-white overflow-x-hidden min-h-screen">
    <div class="noise"></div>
    <div class="scanlines"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
